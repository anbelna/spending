<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Spending">
<meta name="theme-color" content="#0f0f0f">
<title>Spending Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: rgba(255,255,255,0.08);
    --text: #f0f0f0;
    --muted: #888;
    --accent: #c8f562;
    --danger: #ff5f5f;
    --radius: 16px;
    --radius-sm: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overscroll-behavior: none; }

  /* Layout */
  .app { display: flex; flex-direction: column; height: 100dvh; max-width: 430px; margin: 0 auto; position: relative; }
  .scroll-area { flex: 1; overflow-y: auto; padding: 0 16px 120px; }
  .scroll-area::-webkit-scrollbar { display: none; }

  /* Header */
  .top-bar { padding: 56px 16px 20px; background: var(--bg); position: sticky; top: 0; z-index: 10; }
  .top-bar h1 { font-size: 28px; font-weight: 300; letter-spacing: -0.5px; }
  .top-bar h1 span { color: var(--accent); font-weight: 500; }

  /* Summary cards */
  .summary { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 24px; }
  .summary-card { background: var(--surface); border-radius: var(--radius); padding: 14px 16px; border: 0.5px solid var(--border); }
  .summary-card.wide { grid-column: span 2; background: var(--accent); }
  .summary-card.wide .s-label { color: #2a3800; }
  .summary-card.wide .s-value { color: #0f0f0f; }
  .s-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
  .s-value { font-size: 22px; font-weight: 500; font-family: 'DM Mono', monospace; letter-spacing: -0.5px; }

  /* Category pills */
  .section-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; }
  .cat-pills { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 20px; }
  .cat-pills::-webkit-scrollbar { display: none; }
  .pill { white-space: nowrap; padding: 6px 14px; border-radius: 99px; font-size: 13px; border: 0.5px solid var(--border); background: var(--surface); color: var(--muted); cursor: pointer; transition: all 0.15s; }
  .pill.active { background: var(--accent); color: #0f0f0f; border-color: var(--accent); font-weight: 500; }

  /* Entry list */
  .entries { display: flex; flex-direction: column; gap: 1px; }
  .date-group-label { font-size: 12px; color: var(--muted); padding: 16px 0 8px; font-weight: 500; }
  .entry { display: flex; align-items: center; gap: 12px; background: var(--surface); padding: 14px 16px; border-radius: var(--radius-sm); cursor: pointer; transition: background 0.15s; }
  .entry:active { background: var(--surface2); }
  .entry-icon { width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .entry-info { flex: 1; min-width: 0; }
  .entry-desc { font-size: 15px; font-weight: 400; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .entry-cat { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .entry-amount { font-family: 'DM Mono', monospace; font-size: 15px; font-weight: 500; flex-shrink: 0; }
  .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty-state .big { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 15px; line-height: 1.6; }

  /* FAB */
  .fab { position: fixed; bottom: 28px; right: 50%; transform: translateX(50%); max-width: calc(430px - 32px); width: calc(100% - 32px); background: var(--accent); color: #0f0f0f; border: none; border-radius: 99px; height: 56px; font-size: 16px; font-weight: 500; font-family: 'DM Sans', sans-serif; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; box-shadow: 0 8px 32px rgba(200,245,98,0.3); z-index: 20; transition: transform 0.15s, box-shadow 0.15s; }
  .fab:active { transform: translateX(50%) scale(0.97); box-shadow: 0 4px 16px rgba(200,245,98,0.2); }

  /* Bottom Sheet */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 30; opacity: 0; pointer-events: none; transition: opacity 0.25s; backdrop-filter: blur(4px); }
  .overlay.open { opacity: 1; pointer-events: all; }
  .sheet { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%) translateY(100%); width: 100%; max-width: 430px; background: var(--surface); border-radius: 24px 24px 0 0; z-index: 40; padding: 12px 20px 40px; transition: transform 0.3s cubic-bezier(0.32,0.72,0,1); }
  .sheet.open { transform: translateX(-50%) translateY(0); }
  .sheet-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 20px; }
  .sheet h2 { font-size: 18px; font-weight: 500; margin-bottom: 20px; }
  .field { margin-bottom: 16px; }
  .field label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; display: block; margin-bottom: 8px; }
  .field input, .field select { width: 100%; background: var(--surface2); border: 0.5px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 16px; padding: 14px 16px; appearance: none; outline: none; }
  .field input:focus, .field select:focus { border-color: var(--accent); }
  .field select option { background: #1a1a1a; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .cat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .cat-btn { background: var(--surface2); border: 0.5px solid var(--border); border-radius: var(--radius-sm); padding: 10px 4px; text-align: center; cursor: pointer; transition: all 0.15s; }
  .cat-btn.sel { border-color: var(--accent); background: rgba(200,245,98,0.1); }
  .cat-btn .icon { font-size: 20px; display: block; margin-bottom: 4px; }
  .cat-btn .name { font-size: 10px; color: var(--muted); }
  .cat-btn.sel .name { color: var(--accent); }
  .btn-submit { width: 100%; background: var(--accent); color: #0f0f0f; border: none; border-radius: 99px; height: 52px; font-size: 16px; font-weight: 500; font-family: 'DM Sans', sans-serif; cursor: pointer; margin-top: 8px; transition: opacity 0.15s; }
  .btn-submit:active { opacity: 0.85; }

  /* Detail sheet */
  .detail-sheet { padding-bottom: 32px; }
  .detail-amount { font-family: 'DM Mono', monospace; font-size: 36px; font-weight: 500; margin: 8px 0 4px; color: var(--accent); }
  .detail-cat { font-size: 14px; color: var(--muted); margin-bottom: 20px; }
  .detail-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 0.5px solid var(--border); font-size: 14px; }
  .detail-row:last-of-type { border-bottom: none; }
  .detail-row .dk { color: var(--muted); }
  .btn-delete { width: 100%; background: rgba(255,95,95,0.1); color: var(--danger); border: 0.5px solid rgba(255,95,95,0.3); border-radius: 99px; height: 48px; font-size: 15px; font-weight: 500; font-family: 'DM Sans', sans-serif; cursor: pointer; margin-top: 20px; }

  /* Toast */
  .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--text); color: var(--bg); padding: 10px 20px; border-radius: 99px; font-size: 14px; font-weight: 500; z-index: 100; opacity: 0; transition: opacity 0.2s; pointer-events: none; white-space: nowrap; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
<div class="app">
  <div class="top-bar">
    <h1>My <span>Spending</span></h1>
  </div>

  <div class="scroll-area">
    <div class="summary">
      <div class="summary-card wide">
        <div class="s-label">Total all time</div>
        <div class="s-value" id="s-total">$0.00</div>
      </div>
      <div class="summary-card">
        <div class="s-label">This month</div>
        <div class="s-value" id="s-month">$0.00</div>
      </div>
      <div class="summary-card">
        <div class="s-label">Entries</div>
        <div class="s-value" id="s-count">0</div>
      </div>
    </div>

    <div class="section-label">Filter by category</div>
    <div class="cat-pills" id="cat-pills"></div>

    <div class="entries" id="entries-list"></div>
  </div>

  <button class="fab" onclick="openAdd()">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M10 4v12M4 10h12" stroke="#0f0f0f" stroke-width="2" stroke-linecap="round"/></svg>
    Add expense
  </button>
</div>

<!-- Add Sheet -->
<div class="overlay" id="add-overlay" onclick="closeAdd()"></div>
<div class="sheet" id="add-sheet">
  <div class="sheet-handle"></div>
  <h2>New expense</h2>
  <div class="field">
    <label>Description</label>
    <input type="text" id="f-desc" placeholder="What did you spend on?" autocomplete="off" />
  </div>
  <div class="row2">
    <div class="field">
      <label>Amount</label>
      <input type="number" id="f-amount" placeholder="0.00" min="0" step="0.01" inputmode="decimal" />
    </div>
    <div class="field">
      <label>Date</label>
      <input type="date" id="f-date" />
    </div>
  </div>
  <div class="field">
    <label>Category</label>
    <div class="cat-grid" id="cat-grid"></div>
  </div>
  <div class="field">
    <label>Note (optional)</label>
    <input type="text" id="f-note" placeholder="Extra detail..." autocomplete="off" />
  </div>
  <button class="btn-submit" onclick="addEntry()">Save expense</button>
</div>

<!-- Detail Sheet -->
<div class="overlay" id="detail-overlay" onclick="closeDetail()"></div>
<div class="sheet detail-sheet" id="detail-sheet">
  <div class="sheet-handle"></div>
  <div id="detail-content"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const CATS = [
  { name: 'Food', icon: '🍜', key: 'Food & Dining' },
  { name: 'Groceries', icon: '🛒', key: 'Groceries' },
  { name: 'Transport', icon: '🚗', key: 'Transport' },
  { name: 'Shopping', icon: '🛍️', key: 'Shopping' },
  { name: 'Health', icon: '💊', key: 'Health' },
  { name: 'Fun', icon: '🎬', key: 'Entertainment' },
  { name: 'Bills', icon: '💡', key: 'Bills & Utilities' },
  { name: 'Other', icon: '📦', key: 'Other' },
];

const CAT_BG = {
  'Food & Dining': '#2d1f0a', 'Groceries': '#0d2210', 'Transport': '#0a1a2e',
  'Shopping': '#2d0a1a', 'Health': '#1a0a2d', 'Entertainment': '#2d1a00',
  'Bills & Utilities': '#1a1a1a', 'Other': '#0a2020',
};

let entries = [];
let selectedCat = CATS[0].key;
let filterCat = '';
let viewingId = null;

function load() {
  try { entries = JSON.parse(localStorage.getItem('spending_v2') || '[]'); } catch(e) { entries = []; }
  buildCatGrid();
  buildFilterPills();
  render();
}

function save() {
  localStorage.setItem('spending_v2', JSON.stringify(entries));
}

function fmt(n) {
  return '$' + Number(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function today() {
  return new Date().toISOString().split('T')[0];
}

function fmtDate(d) {
  if (!d) return '';
  const dt = new Date(d + 'T12:00:00');
  const now = new Date();
  const diff = Math.floor((new Date(today()) - new Date(d)) / 86400000);
  if (diff === 0) return 'Today';
  if (diff === 1) return 'Yesterday';
  if (diff < 7) return dt.toLocaleDateString('en-US', { weekday: 'long' });
  return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: diff > 300 ? 'numeric' : undefined });
}

function buildCatGrid() {
  const grid = document.getElementById('cat-grid');
  grid.innerHTML = CATS.map(c => `
    <div class="cat-btn${c.key === selectedCat ? ' sel' : ''}" onclick="selectCat('${c.key}')">
      <span class="icon">${c.icon}</span>
      <span class="name">${c.name}</span>
    </div>`).join('');
}

function selectCat(key) {
  selectedCat = key;
  buildCatGrid();
}

function buildFilterPills() {
  const usedCats = [...new Set(entries.map(e => e.cat))];
  const pills = document.getElementById('cat-pills');
  pills.innerHTML = `<div class="pill${filterCat === '' ? ' active' : ''}" onclick="setFilter('')">All</div>` +
    CATS.filter(c => usedCats.includes(c.key)).map(c =>
      `<div class="pill${filterCat === c.key ? ' active' : ''}" onclick="setFilter('${c.key}')">${c.icon} ${c.name}</div>`
    ).join('');
}

function setFilter(key) {
  filterCat = key;
  buildFilterPills();
  render();
}

function render() {
  const now = new Date();
  const monthStr = now.toISOString().slice(0, 7);
  const total = entries.reduce((s, e) => s + e.amount, 0);
  const monthTotal = entries.filter(e => e.date && e.date.startsWith(monthStr)).reduce((s, e) => s + e.amount, 0);
  document.getElementById('s-total').textContent = fmt(total);
  document.getElementById('s-month').textContent = fmt(monthTotal);
  document.getElementById('s-count').textContent = entries.length;

  let filtered = filterCat ? entries.filter(e => e.cat === filterCat) : entries;
  const list = document.getElementById('entries-list');

  if (!filtered.length) {
    list.innerHTML = `<div class="empty-state"><div class="big">💸</div><p>No expenses yet.<br>Tap the button below to add one.</p></div>`;
    return;
  }

  // Group by date
  const groups = {};
  filtered.forEach(e => {
    const k = e.date || 'Unknown';
    if (!groups[k]) groups[k] = [];
    groups[k].push(e);
  });

  const sortedDates = Object.keys(groups).sort((a, b) => b.localeCompare(a));
  list.innerHTML = sortedDates.map(date => {
    const dayTotal = groups[date].reduce((s, e) => s + e.amount, 0);
    const rowsHtml = groups[date].map(e => {
      const cat = CATS.find(c => c.key === e.cat) || CATS[7];
      const bg = CAT_BG[e.cat] || '#1a1a1a';
      return `<div class="entry" onclick="viewEntry(${e.id})">
        <div class="entry-icon" style="background:${bg}">${cat.icon}</div>
        <div class="entry-info">
          <div class="entry-desc">${e.desc}</div>
          <div class="entry-cat">${e.cat}${e.note ? ' · ' + e.note : ''}</div>
        </div>
        <div class="entry-amount">${fmt(e.amount)}</div>
      </div>`;
    }).join('');
    return `<div class="date-group-label">${fmtDate(date)} <span style="color:var(--muted);font-weight:300">· ${fmt(dayTotal)}</span></div>${rowsHtml}`;
  }).join('');
}

function openAdd() {
  document.getElementById('f-desc').value = '';
  document.getElementById('f-amount').value = '';
  document.getElementById('f-note').value = '';
  document.getElementById('f-date').value = today();
  document.getElementById('add-overlay').classList.add('open');
  document.getElementById('add-sheet').classList.add('open');
  setTimeout(() => document.getElementById('f-desc').focus(), 300);
}

function closeAdd() {
  document.getElementById('add-overlay').classList.remove('open');
  document.getElementById('add-sheet').classList.remove('open');
}

function addEntry() {
  const desc = document.getElementById('f-desc').value.trim();
  const amount = parseFloat(document.getElementById('f-amount').value);
  const date = document.getElementById('f-date').value || today();
  const note = document.getElementById('f-note').value.trim();
  if (!desc || isNaN(amount) || amount <= 0) { showToast('Please fill in description and amount'); return; }
  entries.unshift({ id: Date.now(), desc, amount, date, cat: selectedCat, note });
  save();
  buildFilterPills();
  render();
  closeAdd();
  showToast('Expense saved!');
}

function viewEntry(id) {
  const e = entries.find(x => x.id === id);
  if (!e) return;
  viewingId = id;
  const cat = CATS.find(c => c.key === e.cat) || CATS[7];
  document.getElementById('detail-content').innerHTML = `
    <div style="font-size:32px;margin-bottom:8px">${cat.icon}</div>
    <div style="font-size:18px;font-weight:500">${e.desc}</div>
    <div class="detail-amount">${fmt(e.amount)}</div>
    <div class="detail-cat">${e.cat}</div>
    <div class="detail-row"><span class="dk">Date</span><span>${fmtDate(e.date)}</span></div>
    ${e.note ? `<div class="detail-row"><span class="dk">Note</span><span>${e.note}</span></div>` : ''}
    <button class="btn-delete" onclick="deleteEntry(${id})">Delete expense</button>`;
  document.getElementById('detail-overlay').classList.add('open');
  document.getElementById('detail-sheet').classList.add('open');
}

function closeDetail() {
  document.getElementById('detail-overlay').classList.remove('open');
  document.getElementById('detail-sheet').classList.remove('open');
}

function deleteEntry(id) {
  entries = entries.filter(e => e.id !== id);
  save();
  buildFilterPills();
  render();
  closeDetail();
  showToast('Deleted');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

load();
</script>
</body>
</html>
